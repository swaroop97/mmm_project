# Budget Optimization Configuration

optimization:
  method: "scipy"  # Options: scipy, pulp, differential_evolution
  
  # Objective function
  objective: "roi"  # Options: roi, revenue, profit
  
  # Default constraints
  default_constraints:
    min_spend_per_channel: 0
    max_spend_per_channel: null  # null = no limit
    min_spend_pct: 0.05  # Minimum 5% of total budget per channel
    max_spend_pct: 0.50  # Maximum 50% of total budget per channel
  
  # Channel-specific constraints
  channel_constraints:
    TV:
      min_spend: 10000
      max_spend: 500000
      min_spend_pct: 0.10
      max_spend_pct: 0.40
    Radio:
      min_spend: 5000
      max_spend: 200000
      min_spend_pct: 0.05
      max_spend_pct: 0.20
    Digital:
      min_spend: 5000
      max_spend: 300000
      min_spend_pct: 0.10
      max_spend_pct: 0.30
    Social:
      min_spend: 2000
      max_spend: 150000
      min_spend_pct: 0.05
      max_spend_pct: 0.25
    Search:
      min_spend: 3000
      max_spend: 200000
      min_spend_pct: 0.10
      max_spend_pct: 0.30
    Display:
      min_spend: 2000
      max_spend: 100000
      min_spend_pct: 0.05
      max_spend_pct: 0.20

scenarios:
  # Budget scenarios to evaluate
  scenarios:
    - name: "Base Case"
      total_budget: 1000000
    - name: "High Budget"
      total_budget: 1500000
    - name: "Low Budget"
      total_budget: 750000
    - name: "Digital Focus"
      total_budget: 1000000
      channel_weights:
        Digital: 1.5
        Social: 1.2
        Search: 1.3
        TV: 0.8
        Radio: 0.7
        Display: 0.9

output:
  save_results: true
  results_path: "data/results/optimization_results.csv"
  include_forecasts: true
  forecast_horizon_days: 90

